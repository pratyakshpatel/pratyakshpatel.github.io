<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pratyaksh Patel - Academic Website</title>
  <style>
    /* basic reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f6e8dc; /* light skin tone background */
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 900px;
      display: flex;
      align-items: center;
      gap: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgb(0 0 0 / 0.1);
      padding: 2rem;
    }
    .text-section {
      flex: 1;
      text-align: left;
      padding-right: 1rem;
    }
    .text-section h1 {
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 0.4rem;
    }
    .text-section p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 1rem;
      max-width: 500px;
    }
    .photo-section {
      flex-shrink: 0;
      width: 160px;
      height: 160px;
      border-radius: 50%; /* circular photo */
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .photo-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Responsive for mobile */
    @media (max-width: 600px) {
      body {
        padding: 1rem;
      }
      .container {
        flex-direction: column;
        padding: 1.5rem;
      }
      .photo-section {
        width: 120px;
        height: 120px;
        margin-bottom: 1rem;
      }
      .text-section {
        padding-right: 0;
        text-align: center;
      }
      .text-section h1 {
        font-size: 2rem;
      }
      .text-section p {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="text-section">
      <h1>Pratyaksh Patel</h1>
      <p>Graduate Student | Researcher | Data Scientist</p>
      <p>Welcome to my academic website. Here you can find information about my research experience, projects, interests, and more.</p>
    </div>
    <div class="photo-section">
      <img src="your-photo.jpg" alt="Pratyaksh Patel Photo" />
    </div>
  </div>
</body>
</html>
